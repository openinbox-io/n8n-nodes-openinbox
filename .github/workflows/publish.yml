name: Publish to npm

# Publishes the package to the public npm registry with an attached
# provenance statement. n8n requires provenance for verified community
# nodes from May 1st 2026 onward:
# https://docs.n8n.io/integrations/creating-nodes/deploy/submit-community-nodes/
#
# Trigger: pushing a `v*` git tag (e.g. `v1.0.5`) OR manual run from the
# Actions tab. The tagged commit's `package.json` version must match the tag.
#
# Required repo secret:
#   NPM_TOKEN  An npm automation token with 2FA-on-publish disabled (or
#              "auth-only" 2FA) so it can publish from CI. Generate at
#              https://www.npmjs.com/settings/<user>/tokens.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  # Required to mint the OIDC token that npm uses to attest provenance.
  id-token: write

jobs:
  publish:
    name: Build, test, and publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        # `--ignore-scripts` skips native postinstall builds (notably
        # `isolated-vm`, pulled in transitively by `n8n-workflow`). That
        # package fails to compile against Node 20.20+ V8 headers
        # (v8::SourceLocation API change) and we don't need it: this
        # package only consumes `n8n-workflow` for types, lint, and the
        # smoke test — never executing n8n's sandbox at build time.
        run: npm ci --ignore-scripts

      - name: Run tests (lint + build + smoke)
        run: npm test

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
